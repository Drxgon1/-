<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ERROR_071826</title>
    <style>
        body {
            background-color: #050a05;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            max-width: 800px;
            margin: 10% auto;
            border: 1px solid #33ff33;
            padding: 30px;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.4);
            background: rgba(0, 5, 0, 0.8);
        }

        .glitch-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: flicker 0.15s infinite;
        }

        .output-text {
            font-size: 1.1em;
            line-height: 1.6;
            text-align: left;
            border-right: 2px solid #33ff33;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 3s steps(40, end) forwards, blink 0.8s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #33ff33; }
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="glitch-title">⚠️ SYSTEM STATUS: COMPROMISED</div>
        <div class="output-text">SIGNAL LOST. DETECTING SEED LAYER...</div>
    </div>
